   Connection detail
   ========================================================= */
let connDetailCfg = -1;
let connDetailID = -1;
var connDetailES = null;

var connDetailFrom = ''; // 'detail' or 'history' — where we came from

function viewConnection(configIndex, connID) {
  var hp = document.getElementById('historyPage');
  if (hp && hp.classList.contains('open')) connDetailFrom = 'history';
  else if (detail.classList.contains('open')) connDetailFrom = 'detail';
  window.location.hash = '#/config/' + configIndex + '/connection/' + connID;
}

function showConnDetail(configIndex, connID) {
  overview.style.display = 'none';
  if (!connDetailFrom) connDetailFrom = (historyCfgIndex >= 0) ? 'history' : 'detail';
  detail.classList.remove('open');
  document.getElementById('historyPage').classList.remove('open');
  const cd = document.getElementById('connDetail');
  cd.classList.add('open');
  connDetailCfg = configIndex;
  connDetailID = connID;
  detailIndex = configIndex;
  cd.innerHTML = '<div class="conn-empty">Loading...</div>';

  // Close previous SSE
  if (connDetailES) { connDetailES.close(); connDetailES = null; }

  connDetailES = new EventSource('/api/configs/' + configIndex + '/connection/' + connID + '/events');
  connDetailES.addEventListener('init', function(e) {
    try {
      var rec = JSON.parse(e.data);
      if (connDetailCfg !== configIndex || connDetailID !== connID) return;
      window._bwRec = rec;
      if (rec.pairedID) {
        fetch('/api/configs/' + configIndex + '/connection/' + rec.pairedID)
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(paired) { renderConnDetail(rec, paired, configIndex); })
          .catch(function() { renderConnDetail(rec, null, configIndex); });
      } else {
        renderConnDetail(rec, null, configIndex);
      }
    } catch(_) {}
  });
  connDetailES.addEventListener('update', function(e) {
    try {
      var d = JSON.parse(e.data);
      var rec = window._bwRec;
      if (!rec) return;
      // Apply delta to cached record
      rec.readBytes = d.readBytes;
      rec.writBytes = d.writBytes;
      rec.lastActive = d.lastActive;
      if (d.si != null && rec.samples && rec.samples[d.si]) {
        rec.samples[d.si].r = d.sr;
        rec.samples[d.si].w = d.sw;
      }
      var cd2 = document.getElementById('connDetail');
      if (!cd2 || !cd2.classList.contains('open')) return;
      // Update duration
      var durEl = cd2.querySelector('.conn-duration');
      if (durEl && rec.startTime && !rec.endTime) {
        durEl.textContent = fmtDurationMs(Date.now() - new Date(rec.startTime).getTime());
      }
      // Update byte counters
      var vals = cd2.querySelectorAll('.v');
      for (var i = 0; i < vals.length; i++) {
        var prevEl = vals[i].previousElementSibling;
        if (prevEl && prevEl.textContent === '\u2193 Read') vals[i].textContent = fmtBytes(rec.readBytes);
        if (prevEl && prevEl.textContent === '\u2191 Written') vals[i].textContent = fmtBytes(rec.writBytes);
      }
      // Redraw chart in-place (no DOM replacement — avoids flicker)
      var a = bwAnalysis(rec);
      if (!a) return;
      var mode = bwViewMode[rec.id] || 'bar';
      var canvas;
      if (mode === 'line') canvas = document.getElementById('bwline-' + rec.id);
      else if (mode === 'bar') canvas = document.getElementById('bwbar-' + rec.id);
      if (canvas) {
        var ctx = canvas.getContext('2d');
        var n = a.lastSec + 1;
        if (mode === 'line') {
          var dpr = window.devicePixelRatio || 1;
          var w = canvas.width / dpr, h = canvas.height / dpr;
          ctx.save(); ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);
          var stepX = w / Math.max(1, n - 1);
          ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 0.5;
          for (var g = 0; g <= 3; g++) { var gy = Math.round(h*g/3)+0.5; ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(w,gy); ctx.stroke(); }
          ctx.beginPath();
          for (var i = 0; i < n; i++) { var rh = ((rec.samples[i]?rec.samples[i].r:0)||0)/a.peak*(h-4); i===0 ? ctx.moveTo(i*stepX, h-rh) : ctx.lineTo(i*stepX, h-rh); }
          ctx.strokeStyle = '#1a73e8'; ctx.lineWidth = 2; ctx.stroke();
          ctx.beginPath();
          for (var i = 0; i < n; i++) { var wh = ((rec.samples[i]?rec.samples[i].w:0)||0)/a.peak*(h-4); i===0 ? ctx.moveTo(i*stepX, h-wh) : ctx.lineTo(i*stepX, h-wh); }
          ctx.strokeStyle = '#1e8e3e'; ctx.lineWidth = 2; ctx.stroke();
          ctx.restore();
        } else {
          var w2 = canvas.width, h2 = canvas.height;
          ctx.clearRect(0, 0, w2, h2);
          var barW = Math.max(2, Math.floor(w2 / n));
          for (var i = 0; i < n; i++) {
            var s = rec.samples[i] || {r:0,w:0};
            var rh2 = Math.max(1, Math.round(s.r / a.peak * h2));
            var wh2 = Math.max(1, Math.round(s.w / a.peak * h2));
            ctx.fillStyle = '#1a73e8'; ctx.fillRect(i * barW, h2 - rh2, Math.max(1, barW/2 - 0.5), rh2);
            ctx.fillStyle = '#1e8e3e'; ctx.fillRect(i * barW + barW/2 + 0.5, h2 - wh2, Math.max(1, barW/2 - 0.5), wh2);
          }
        }
      }
    } catch(_) {}
  });
  connDetailES.addEventListener('closed', function(e) {
    try {
      var rec = JSON.parse(e.data);
      if (connDetailCfg !== configIndex || connDetailID !== rec.id) return;
      window._bwRec = rec;
      if (rec.pairedID) {
        fetch('/api/configs/' + configIndex + '/connection/' + rec.pairedID)
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(paired) { renderConnDetail(rec, paired, configIndex); })
          .catch(function() { renderConnDetail(rec, null, configIndex); });
      } else {
        renderConnDetail(rec, null, configIndex);
      }
      if (connDetailES) { connDetailES.close(); connDetailES = null; }
    } catch(_) {}
  });
  connDetailES.onerror = function() {};
}


function pollConnDetail(configIndex, connID) {
  fetch('/api/configs/' + configIndex + '/connection/' + connID)
    .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
    .then(data => {
      if (connDetailCfg !== configIndex || connDetailID !== connID) return;
      if (data.pairedID) {
        fetch('/api/configs/' + configIndex + '/connection/' + data.pairedID)
          .then(r => r.ok ? r.json() : null)
          .then(paired => renderConnDetail(data, paired, configIndex))
          .catch(() => renderConnDetail(data, null, configIndex));
      } else {
        renderConnDetail(data, null, configIndex);
      }
    }).catch(e => {
      document.getElementById('connDetail').innerHTML =
        '<div class="conn-empty">Connection not found</div>';
    });
}

function renderConnDetail(rec, paired, configIndex) {
  window._bwRec = rec; // for renderBwView
  const cd = document.getElementById('connDetail');
  const isActive = !rec.endTime;
  const isIdle = isActive && rec.lastActive && (Date.now() - rec.lastActive / 1000000) > 1000;
  const cStatus = rec.endTime ? 'closed' : (isIdle ? 'idle' : 'active');
  const cLabel = rec.endTime ? 'Closed' : (isIdle ? 'Idle' : 'Active');
  const dur = isActive
    ? fmtDurationMs(Date.now() - new Date(rec.startTime).getTime())
    : fmtDurationMs(new Date(rec.endTime).getTime() - new Date(rec.startTime).getTime());

  function sideCard(label, r) {
    if (!r) return '';
    const sd = isActive ? fmtDurationMs(Date.now() - new Date(r.startTime).getTime()) : '-';
    return `<div class="side-card">
      <h3>${label}</h3>
      <div class="kv-grid">
        <div class="k">ID</div><div class="v">${r.id}</div>
        <div class="k">Source</div><div class="v">${esc(r.srcAddr || '-')}</div>
        <div class="k">Target</div><div class="v">${esc(r.dstAddr || '-')}</div>
        <div class="k">Host</div><div class="v">${esc(r.host || '-')}</div>
        <div class="k">Started</div><div class="v">${new Date(r.startTime).toLocaleString()}</div>
        <div class="k">${isActive ? 'Duration' : 'Ended'}</div><div class="v"><span class="conn-duration">${isActive ? sd : new Date(r.endTime).toLocaleString() + ' (' + sd + ')'}</span></div>
        <div class="k">↓ Read</div><div class="v">${fmtBytes(r.readBytes)}</div>
        <div class="k">↑ Written</div><div class="v">${fmtBytes(r.writBytes)}</div>
      </div>
    </div>`;
  }

  cd.innerHTML = `
    <div class="back-btn" onclick="${connDetailFrom === 'history' ? 'window.location.hash=\'#/config/' + configIndex + '/history\'' : 'window.location.hash=\'#/config/' + configIndex + '\''}">&larr; Back</div>
    <h2>Connection #${rec.id}</h2>
    <span class="conn-status ${cStatus}">${cLabel}</span>
    ${paired ? '<div style="margin-top:20px">' + sideCard('Inbound', rec) + sideCard('Outbound', paired) + '</div>'
      : sideCard(cLabel + ' Connection', rec)}
    <div style="margin-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h3 style="margin:0;font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em">Bandwidth</h3>
        <span style="display:flex;gap:4px">
          <span class="range-pill" id="bwviewtable-${rec.id}" onclick="switchBwView('table',${rec.id})">Table</span>
          <span class="range-pill" id="bwviewbar-${rec.id}" onclick="switchBwView('bar',${rec.id})">Bar</span>
          <span class="range-pill" id="bwviewline-${rec.id}" onclick="switchBwView('line',${rec.id})">Line</span>
        </span>
      </div>
      <div id="bwcontent-${rec.id}">${renderBwContent(rec)}</div>
    </div>
    <div class="detail-actions" style="margin-top:16px">
      <a class="btn" href="#/config/${configIndex}">View Server Detail &rarr;</a>
    </div>`;
  setTimeout(function(){ updateBwPills(rec.id); }, 0);
}

function bwAnalysis(rec) {
  if (!rec.samples || !rec.samples.length) return null;
  var lastSec = 0, hasData = false, totalR = 0, totalW = 0, peak = 1;
  for (var i = 0; i < rec.samples.length; i++) {
    var s = rec.samples[i];
    if (s.r > 0 || s.w > 0) { lastSec = i; hasData = true; totalR += s.r; totalW += s.w; }
    if (s.r > peak) peak = s.r;
    if (s.w > peak) peak = s.w;
  }
  if (!hasData) return null;
  return { lastSec: lastSec, totalR: totalR, totalW: totalW, peak: peak };
}

function bwSummary(a) {
  if (!a) return '';
  var avgR = a.totalR > 0 ? Math.round(a.totalR / (a.lastSec + 1)) : 0;
  var avgW = a.totalW > 0 ? Math.round(a.totalW / (a.lastSec + 1)) : 0;
  return '<div class="bw-summary"><span style="color:var(--dl)">↓ avg <b>' + fmtBytes(avgR) + '/s</b> total ' + fmtBytes(a.totalR) + '</span>' +
    '<span style="color:var(--ul)">↑ avg <b>' + fmtBytes(avgW) + '/s</b> total ' + fmtBytes(a.totalW) + '</span></div>';
}

function buildBwTable(rec) {
  var a = bwAnalysis(rec);
  if (!a) return '';
  var rows = '', peak = a.peak, lastSec = a.lastSec;
  for (var i = 0; i <= lastSec; i++) {
    var s = rec.samples[i] || {r:0,w:0};
    rows += '<tr><td>' + i + 's</td>' +
      '<td class="bytes">' + (s.r > 0 ? fmtBytes(s.r) : '·') + '</td>' +
      '<td class="bytes">' + (s.w > 0 ? fmtBytes(s.w) : '·') + '</td>' +
      '<td class="bytes">' + ((s.r+s.w) > 0 ? fmtBytes(s.r+s.w) : '·') + '</td></tr>';
  }
  return '<div class="conn-table-wrap"><table class="conn-table"><thead><tr>' +
    '<th>Time</th><th class="bytes">↓ Read</th><th class="bytes">↑ Write</th><th class="bytes">Total</th></tr></thead><tbody>' +
    rows + '</tbody></table></div>' + bwSummary(a);
}

function buildBwBar(rec) {
  var a = bwAnalysis(rec);
  if (!a) return '';
  var cid = 'bwbar-' + rec.id;
  setTimeout(function() {
    var c = document.getElementById(cid);
    if (!c) return;
    var pw = c.parentElement.getBoundingClientRect().width - 32;
    var w = Math.max(pw, 300), h = 180;
    c.width = w; c.height = h;
    var ctx = c.getContext('2d');
    var barW = Math.max(2, Math.floor(w / (a.lastSec + 1)));
    ctx.clearRect(0, 0, w, h);
    for (var i = 0; i <= a.lastSec; i++) {
      var s = rec.samples[i] || {r:0,w:0};
      var rh = Math.max(1, Math.round(s.r / a.peak * h));
      var wh = Math.max(1, Math.round(s.w / a.peak * h));
      ctx.fillStyle = '#1a73e8'; ctx.fillRect(i * barW, h - rh, Math.max(1, barW/2 - 0.5), rh);
      ctx.fillStyle = '#1e8e3e'; ctx.fillRect(i * barW + barW/2 + 0.5, h - wh, Math.max(1, barW/2 - 0.5), wh);
    }
  }, 50);
  return '<canvas id="' + cid + '" class="bw-canvas"></canvas>' + bwSummary(a);
}

function buildBwLine(rec) {
  var a = bwAnalysis(rec);
  if (!a) return '';
  var cid = 'bwline-' + rec.id;
  setTimeout(function() {
    var c = document.getElementById(cid);
    if (!c) return;
    var dpr = window.devicePixelRatio || 1;
    var pw = c.parentElement.getBoundingClientRect().width - 32;
    var w = Math.max(pw, 300), h = 180;
    c.width = w * dpr; c.height = h * dpr; c.style.width = w + 'px'; c.style.height = h + 'px';
    var ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);
    var n = a.lastSec + 1, stepX = w / Math.max(1, n - 1);

    // Grid
    ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 0.5;
    for (var g = 0; g <= 3; g++) {
      var gy = Math.round(h * g / 3) + 0.5;
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
    }

    // Download line
    ctx.beginPath();
    for (var i = 0; i < n; i++) {
      var rh = ((rec.samples[i] ? rec.samples[i].r : 0) || 0) / a.peak * (h - 4);
      if (i === 0) ctx.moveTo(i * stepX, h - rh); else ctx.lineTo(i * stepX, h - rh);
    }
    ctx.strokeStyle = '#1a73e8'; ctx.lineWidth = 2; ctx.stroke();

    // Upload line
    ctx.beginPath();
    for (var i = 0; i < n; i++) {
      var wh = ((rec.samples[i] ? rec.samples[i].w : 0) || 0) / a.peak * (h - 4);
      if (i === 0) ctx.moveTo(i * stepX, h - wh); else ctx.lineTo(i * stepX, h - wh);
    }
    ctx.strokeStyle = '#1e8e3e'; ctx.lineWidth = 2; ctx.stroke();
  }, 50);
  return '<canvas id="' + cid + '" class="bw-canvas"></canvas>' + bwSummary(a);
}

var bwViewMode = {};
function renderBwContent(rec) {
  if (!bwAnalysis(rec)) return '';
  var mode = bwViewMode[rec.id] || 'bar';
  if (mode === 'table') return buildBwTable(rec);
  if (mode === 'line') return buildBwLine(rec);
  return buildBwBar(rec);
}

function updateBwPills(recId) {
  var mode = bwViewMode[recId] || 'bar';
  ['table','bar','line'].forEach(function(m) {
    var el = document.getElementById('bwview' + m + '-' + recId);
    if (!el) return;
    el.style.background = m === mode ? 'var(--primary)' : 'var(--surface-variant)';
    el.style.color = m === mode ? '#fff' : 'var(--text-secondary)';
  });
}

function switchBwView(mode, recId) {
  bwViewMode[recId] = mode;
  updateBwPills(recId);
  renderBwView(recId);
}

function renderBwView(recId) {
  var content = document.getElementById('bwcontent-' + recId);
  if (!content) return;
  var rec = window._bwRec;
  if (!rec || rec.id !== recId) return;
  content.innerHTML = renderBwContent(rec);
}

function hideConnDetail() {
  if (connDetailES) { connDetailES.close(); connDetailES = null; }
  document.getElementById('connDetail').classList.remove('open');
  connDetailCfg = -1;
  connDetailID = -1;
  connDetailFrom = '';
}

/* =========================================================
   SSE — real-time event-driven updates (with polling fallback)
   ========================================================= */
(function initSSE() {
  var evtSource = new EventSource('/api/events');
  evtSource.addEventListener('stats_updated', function(e) {
    try {
      var d = JSON.parse(e.data);
      var cfgIdx = d.configIndex;
      // Update card rates directly from SSE data (no HTTP fetch needed)
      updateCardRates(cfgIdx, d.connections, d.readRate, d.writRate);
      // Update detail stats too if we're viewing this config
      if (detailIndex === cfgIdx) updateDetailRates(cfgIdx, d.connections, d.readRate, d.writRate);
    } catch(_) {}
  });
  evtSource.addEventListener('connection_opened', function(e) {
    try {
      var d = JSON.parse(e.data);
      if (detailIndex === d.configIndex) pollActiveConns(detailIndex);
    } catch(_) {}
  });
  evtSource.addEventListener('connection_closed', function(e) {
    try {
      var d = JSON.parse(e.data);
      if (detailIndex === d.configIndex) pollActiveConns(detailIndex);
      // If the closed connection is the one we're viewing, refresh once
      if (connDetailCfg === d.configIndex && connDetailID === d.connId) {
        pollConnDetail(d.configIndex, d.connId);
      }
    } catch(_) {}
  });
  evtSource.addEventListener('backend_status_changed', function(e) {
    try {
      var d = JSON.parse(e.data);
      var cardEntry = cards.get(d.configIndex);
      if (cardEntry) {
        fetch('/api/configs/' + d.configIndex).then(function(r) { return r.json(); }).then(function(cfg) {
          fetch('/api/traffic').then(function(r2) { return r2.json(); }).catch(function() { return []; }).then(function(traffic) {
            var ts = (traffic && traffic[d.configIndex]) ? traffic[d.configIndex] : [];
            updateCard(cfg, ts, cardEntry);
          });
        }).catch(function(){});
      }
    } catch(_) {}
  });
  evtSource.addEventListener('config_status_changed', function(e) {
    try {
      var d = JSON.parse(e.data);
      var cardEntry = cards.get(d.configIndex);
      if (cardEntry) {
        fetch('/api/configs/' + d.configIndex).then(function(r) { return r.json(); }).then(function(cfg) {
          fetch('/api/traffic').then(function(r2) { return r2.json(); }).catch(function() { return []; }).then(function(traffic) {
            var ts = (traffic && traffic[d.configIndex]) ? traffic[d.configIndex] : [];
            updateCard(cfg, ts, cardEntry);
          });
        }).catch(function(){});
      }
    } catch(_) {}
  });
  evtSource.addEventListener('process_updated', function(e) {
    try { procSSEUpdate(JSON.parse(e.data)); } catch(_) {}
  });
  evtSource.addEventListener('reject_updated', function(e) {
    try {
      var d = JSON.parse(e.data);
      if (detailIndex !== d.configIndex) return;
      renderRejectCounters(d.configIndex, d.counters);
    } catch(_) {}
  });
  evtSource.onerror = function() {
    // SSE disconnected — fall back to polling after 5s
    evtSource.close();
    setTimeout(function() { initSSE(); }, 5000);
  };
})();

/* =========================================================
   Process history
   ========================================================= */
function procYLabel(peak, field) {
  if (field === 'heapAlloc' || field === 'heapSys') return fmtBytes(peak);
  if (field === 'cpuPercent') return peak.toFixed(1) + '%';
  return String(Math.round(peak));
}

function drawProcChart(canvas, data, field, color, label) {
  if (!canvas || !data || !data.length) return;
  var ctx = canvas.getContext('2d');
  var h = canvas.height || 80;
  var yPadLeft = 36, yPadRight = 4;
  var rect = canvas.parentElement.getBoundingClientRect();
  var w = rect.width - 24; if (w < 200) w = 300;
  canvas.width = w; canvas.style.width = w + 'px';

  var n = data.length, peak = 1;
  for (var i = 0; i < n; i++) { var v = data[i][field] || 0; if (v > peak) peak = v; }
  var pw = w - yPadLeft - yPadRight;
  var stepX = pw / Math.max(1, n - 1);

  ctx.clearRect(0, 0, w, h);

  // Y-axis grid lines + labels (3 levels: peak, peak/2, 0)
  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.font = '9px Inter, sans-serif';
  var levels = 3;
  for (var l = 0; l <= levels; l++) {
    var y = 2 + (h - 4) * l / levels;
    ctx.beginPath(); ctx.moveTo(yPadLeft, y); ctx.lineTo(w - yPadRight, y); ctx.stroke();
    var lv = peak * (levels - l) / levels;
    var txt = procYLabel(lv, field);
    ctx.fillText(txt, 2, y + 4);
  }

  // Area chart
  ctx.beginPath(); ctx.moveTo(yPadLeft, h);
  for (var i = 0; i < n; i++) { ctx.lineTo(yPadLeft + i * stepX, h - ((data[i][field] || 0) / peak) * (h - 4)); }
  ctx.lineTo(yPadLeft + (n - 1) * stepX, h); ctx.closePath();
  ctx.fillStyle = color + '18';
  ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.stroke();

  // Current value label (right side)
  ctx.fillStyle = color; ctx.font = 'bold 10px Inter, sans-serif';
  var raw = data[n-1][field] || 0;
  var valStr = procYLabel(raw, field);
  var tw = ctx.measureText(valStr).width;
  ctx.fillText(valStr, w - tw - yPadRight, 12);
}

var procRange = '60s';
var procBuffer60s = [];
var procBuffer60s = []; // local ring buffer for SSE-driven process data

function switchProcRange(r) {
  if (r === '30m') { procBuffer60s = []; } // reset buffer when switching range
  procRange = r;
  if (r === '30m') { procBuffer60s = []; pollProcess(); } // full reload for 30m
  document.getElementById('range60').style.background = r === '60s' ? 'var(--primary)' : 'var(--surface-variant)';
  document.getElementById('range60').style.color = r === '60s' ? '#fff' : 'var(--text-secondary)';
  document.getElementById('range30m').style.background = r === '30m' ? 'var(--primary)' : 'var(--surface-variant)';
  document.getElementById('range30m').style.color = r === '30m' ? '#fff' : 'var(--text-secondary)';
  document.getElementById('proc-label-cpu').textContent = r;
  document.getElementById('proc-label-heap').textContent = r;
  document.getElementById('proc-label-fd').textContent = r;
  pollProcess();
}

function pollProcess() {
  var url = procRange === '30m' ? '/api/process/minutes' : '/api/process';
  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    if (!data || !data.length) return;
    // For 60s view, update buffer from full data
    if (procRange === '60s') procBuffer60s = data;
    drawProcCharts(data);
  }).catch(function(){});
}

// SSE-driven update for 60s view: append sample to local buffer
function procSSEUpdate(s) {
  if (procRange !== '60s') return;
  procBuffer60s.push(s);
  if (procBuffer60s.length > 30) procBuffer60s.shift();
  drawProcCharts(procBuffer60s);
}

function drawProcCharts(data) {
  if (!data || !data.length) return;
  drawProcChart(document.getElementById('proc-cpu'), data, 'cpuPercent', '#7c3aed', 'C');
  drawProcChart(document.getElementById('proc-heap'), data, 'heapAlloc', '#e67e22', 'H');
  var fdCanvas = document.getElementById('proc-fd');
  var fdChart = document.getElementById('procFDChart');
  var hasFD = false;
  for (var i = 0; i < data.length; i++) { if (data[i].numFD > 0) { hasFD = true; break; } }
  if (fdChart) fdChart.style.display = hasFD ? '' : 'none';
  if (hasFD) drawProcChart(fdCanvas, data, 'numFD', '#3498db', 'F');
}


/* =========================================================
   Connection waterfall (Gantt canvas)
   ========================================================= */
var wfHover = null; // {conn, x, y, w, h}

function renderTimeline(el, conns, configIndex) {
  // Sort by StartTime ascending
  conns.sort(function(a, b) {
    return new Date(a.startTime) - new Date(b.startTime);
  });

  // Compute time range
  var now = Date.now();
  var tMin = Infinity, tMax = 0;
  for (var i = 0; i < conns.length; i++) {
    var st = new Date(conns[i].startTime).getTime();
    var et = conns[i].endTime ? new Date(conns[i].endTime).getTime() : now;
    if (st < tMin) tMin = st;
    if (et > tMax) tMax = et;
  }
  if (!isFinite(tMin)) { el.innerHTML = '<div class="conn-empty">No data</div>'; return; }
  // Pad range by 5%
  var range = tMax - tMin || 1000;
  tMin -= range * 0.05; tMax += range * 0.05; range = tMax - tMin;

  var dpr = window.devicePixelRatio || 1;
  var labelW = 160, rowH = 24, headerH = 32, barH = 18;
  var rect = el.parentElement.getBoundingClientRect();
  var w = Math.max(rect.width - 32, 300);
  var chartW = w - labelW;
  var h = headerH + conns.length * rowH + 4;

  var html = '<div class="wf-wrap">' +
    '<canvas id="wf-canvas" style="width:' + w + 'px;height:' + h + 'px"></canvas></div>';
  el.innerHTML = html;

  setTimeout(function() {
    var canvas = document.getElementById('wf-canvas');
    if (!canvas) return;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    // Grid lines
    var ticks = 5;
    ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 0.5;
    for (var t = 0; t <= ticks; t++) {
      var tx = labelW + Math.round(chartW * t / ticks) + 0.5;
      ctx.beginPath(); ctx.moveTo(tx, 20); ctx.lineTo(tx, h); ctx.stroke();
    }
    // Horizontal row lines
    ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 0.5;
    for (var i = 0; i <= conns.length; i++) {
      var ry = headerH + i * rowH + 0.5;
      ctx.beginPath(); ctx.moveTo(labelW, ry); ctx.lineTo(w, ry); ctx.stroke();
    }

    // Time axis header
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.font = '10px Inter, sans-serif';
    for (var t = 0; t <= ticks; t++) {
      var ts = tMin + range * t / ticks;
      ctx.fillText(new Date(ts).toLocaleTimeString(), labelW + chartW * t / ticks, 14);
    }

    // Draw bars + labels
    var bars = [];
    for (var i = 0; i < conns.length; i++) {
      var c = conns[i];
      var st = new Date(c.startTime).getTime();
      var et = c.endTime ? new Date(c.endTime).getTime() : now;
      var x = labelW + (st - tMin) / range * chartW;
      var bw = Math.max(6, (et - st) / range * chartW);
      var y = headerH + i * rowH + (rowH - barH) / 2;
      var host = c.host || c.dstAddr || '-';
      var isOut = c.srcAddr === 'server';
      var color = isOut ? '#1e8e3e' : '#1a73e8';

      ctx.fillStyle = color + '55';
      ctx.fillRect(x, y, bw, barH);
      ctx.strokeStyle = color; ctx.lineWidth = 1;
      ctx.strokeRect(x, y, bw, barH);

      // Traffic label on bar (right side, or inside if bar is wide enough)
      var bytesText = '↓' + fmtBytes(c.readBytes || 0) + ' ↑' + fmtBytes(c.writBytes || 0);
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.font = '9px Inter, sans-serif';
      var tw = ctx.measureText(bytesText).width;
      if (bw > tw + 10) {
        ctx.fillText(bytesText, x + 4, y + barH - 4);
      } else if (bw > 40) {
        // Show just total
        var tot = fmtBytes((c.readBytes || 0) + (c.writBytes || 0));
        ctx.fillText(tot, x + 4, y + barH - 4);
      }

      // Host label — truncate to fit in label area
      var labelMax = labelW - 12;
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.font = '11px Inter, sans-serif';
      var fullHost = host;
      while (ctx.measureText(fullHost + '…').width > labelMax && fullHost.length > 4) {
        fullHost = fullHost.substring(0, fullHost.length - 1);
      }
      ctx.fillText(fullHost.length < host.length ? fullHost + '…' : host, 6, y + barH - 4);

      bars.push({ conn: c, x: x, y: y, w: bw, h: barH, cfgIdx: configIndex });
    }

    // Hover tooltip div
    var tip = document.createElement('div'); tip.id = 'wf-tip';
    tip.style.cssText = 'position:absolute;display:none;background:rgba(0,0,0,0.82);color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;pointer-events:none;z-index:100;white-space:nowrap;font-family:var(--font-mono)';
    canvas.parentElement.appendChild(tip);

    canvas.onmousemove = function(ev) {
      var cr = canvas.getBoundingClientRect();
      var mx = ev.clientX - cr.left, my = ev.clientY - cr.top;
      var found = null;
      for (var i = 0; i < bars.length; i++) {
        var b = bars[i];
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
          found = b; break;
        }
      }
      if (found) {
        var c = found.conn;
        tip.style.display = 'block';
        tip.style.left = (ev.clientX + 12) + 'px';
        tip.style.top = (ev.clientY - 30) + 'px';
        var dur = '';
        if (c.endTime && c.startTime) dur = ' · ' + fmtDurationMs(new Date(c.endTime) - new Date(c.startTime));
        tip.innerHTML = esc(c.host || c.dstAddr || '-') + dur +
          '<br>↓ ' + fmtBytes(c.readBytes || 0) + '  ↑ ' + fmtBytes(c.writBytes || 0);
        canvas.style.cursor = 'pointer';
      } else {
        tip.style.display = 'none';
        canvas.style.cursor = 'default';
      }
    };
    canvas.onmouseleave = function() { tip.style.display = 'none'; };

    // Click handler
    canvas.onclick = function(ev) {
      var cr = canvas.getBoundingClientRect();
      var mx = ev.clientX - cr.left, my = ev.clientY - cr.top;
      for (var i = 0; i < bars.length; i++) {
        var b = bars[i];
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
          viewConnection(b.cfgIdx, b.conn.id);
          return;
        }
      }
    };
  }, 50);
}
